<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ode Spa - Outbound Caller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: #f8fafc;
        }

        .logo p {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #6366f1;
        }

        input::placeholder {
            color: #475569;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        button:hover {
            background: #4f46e5;
        }

        button:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .status.success {
            display: block;
            background: #064e3b;
            border: 1px solid #065f46;
            color: #6ee7b7;
        }

        .status.error {
            display: block;
            background: #450a0a;
            border: 1px solid #7f1d1d;
            color: #fca5a5;
        }

        .status.loading {
            display: block;
            background: #1e1b4b;
            border: 1px solid #312e81;
            color: #a5b4fc;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>Ode Spa</h1>
            <p>Outbound Call Agent</p>
        </div>

        <form id="callForm">
            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="name" placeholder="e.g. Rahul Sharma" required>
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="phone" placeholder="e.g. +919876543210" required>
            </div>
            <button type="submit" id="callBtn">Start Call</button>
        </form>

        <div class="status" id="status"></div>
    </div>

    <script>
        const form = document.getElementById('callForm');
        const btn = document.getElementById('callBtn');
        const status = document.getElementById('status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            let phone = document.getElementById('phone').value.trim();

            if (!name || !phone) return;

            // Auto-add +91 if user just enters digits
            if (/^\d{10}$/.test(phone)) {
                phone = '+91' + phone;
            }

            btn.disabled = true;
            btn.textContent = 'Calling...';
            status.className = 'status loading';
            status.textContent = `Dialing ${name} at ${phone}...`;

            try {
                const res = await fetch('/call/outbound', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ to: phone, name: name })
                });

                const data = await res.json();

                if (res.ok) {
                    status.className = 'status success';
                    status.textContent = `Call initiated to ${name}. Call SID: ${data.call_sid}`;
                } else {
                    status.className = 'status error';
                    status.textContent = `Error: ${data.error}`;
                }
            } catch (err) {
                status.className = 'status error';
                status.textContent = `Network error: ${err.message}`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Start Call';
            }
        });
    </script>
</body>
</html>
